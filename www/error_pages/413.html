<html>
	<head>
		<meta charset="utf-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<title>413 Error</title>
		<style>
			body{
				font-family:'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
				margin: 0;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				background-color: #F5F5F5;
			}
			h1, h2, p, button{
				margin: 10px 5px;
			}
			main{
				display: flex;
				width: 1200px;
				animation: slideInFade 0.6s ease-out forwards;
			}
			section{
				width: 65%;
				display: flex;
				flex-direction:column;
				padding: 30px;
				border:	none;
				border-radius: 15px;
				background-color: #FFFFFF;
				color: #222222;
			}
			aside{
				display: flex;
				justify-content: center;
				align-items: center;
				flex-direction:column;
				padding: 50px;
				border:	none;
				border-radius: 15px;
				background-color: #222222;
				color: #FFFFFF;
			}
			button{
			    transition: all 0.3s ease; 
      			box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
				align-self: flex-end;
				width: 150px;
				font-size: 18px;
				padding: 10px;
				border:	none;
				border-radius: 15px;
				background-color: #222222;
				color: #FFFFFF;
			}
			button:hover
			{
				transform: translateY(-4px);
				box-shadow: 0 10px 15px rgba(59, 130, 246, 0.4);
				background-color: #111111; 
			}
			p{
				font-size: 20px;
			}
			@keyframes slideInFade{
				0% {
					opacity: 0%;
					transform: translateX(50px);
				}
				100% {
					opacity: 100%;
					transform: translateX(0);
				}
				
			}
	</style>
	</head>
	<body lang="en">
		<main>
			<aside>
				<h1>413 ERROR</h1>
				<h3>❌ EXCEPTION FOUND!</h3>
			</aside>
			<section>
				<header>
					<h2>CONTENT TOO LARGE EXCEPTION</h2>
				</header>
				<h2>Description</h2>
				<p>The content of your request is too large and could not be processed,
				please check the link or page you are trying to visit and try again!</p>
				<button type="button" onclick="history.back()">Go back</button>
			</section>
		</main>
	</body>
</html>
