# ==========================================
# SERVIDOR 1: O site principal (Porta 8080)
# ==========================================
server {
    listen 127.0.0.1:8080;

    # Você tem permissão para implementar virtual hosts, então podemos colocar um server_name
    server_name meublog.42.fr;

    # Páginas de erro padrão
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;

    # Limite máximo do corpo da requisição (útil para segurar uploads gigantes)
    client_max_body_size 10M;

    # Rota 1: Raiz do site (Pública, apenas leitura)
    location / {
        allow_methods GET;
        root /var/www/meublog;
        index index.html;
    }

    # Rota 2: Pasta de assets com listagem de diretórios ativada (Autoindex)
    location /assets {
        allow_methods GET;
        root /var/www/meublog/assets;
        autoindex on;
    }

    # Rota 3: Upload de arquivos
    location /upload {
        allow_methods POST;
        root /var/www/meublog/uploads;

        # Diretiva para autorizar uploads e definir onde salvar
        upload_enable on;
        upload_store /var/www/meublog/uploads/temp;
    }

    # Rota 4: Execução de CGI para scripts PHP
    location /scripts {
        allow_methods GET POST;
        root /var/www/meublog/scripts;
        index index.php;

        # Delega a execução baseada na extensão .php
        cgi_extension .php;
        cgi_path /usr/bin/php-cgi;
    }

    # Rota 5: Redirecionamento HTTP (301 Moved Permanently)
    location /old-page {
        return 301 /new-page.html;
    }
}

# ==========================================
# SERVIDOR 2: Painel de Admin (Porta 9090)
# ==========================================
server {
    listen 127.0.0.1:9090;
    server_name admin.42.fr;

    client_max_body_size 50M;

    # Rota exclusiva para administração, permitindo deleção
    location / {
        allow_methods GET POST DELETE;
        root /var/www/admin;
        index admin.html;
    }

    # CGI para scripts Python
    location /api {
        allow_methods GET POST DELETE;
        root /var/www/admin/api;

        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}
