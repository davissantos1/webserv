server {
    # Define a porta e a interface que o servidor vai escutar
    listen 127.0.0.1:8080;

    # Limite padrão para o tamanho do corpo da requisição
    client_max_body_size 1M;

    # Configuração da rota raiz (/)
    location / {
        # Métodos aceitos
        allow_methods GET;

        # Diretório raiz onde os arquivos estão fisicamente
        root /var/www/html;

        # Arquivo padrão a ser servido
        index index.html;
    }
}
